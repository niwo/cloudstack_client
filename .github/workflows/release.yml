name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem
        run: bundle exec rake build

  publish:
    runs-on: ubuntu-latest
    needs: verify
    environment: rubygems

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Publish gem to RubyGems
        uses: rubygems/release-gem@v1
        with:
          api-key: ${{ secrets.RUBYGEMS_AUTH_TOKEN }}
